services:
  inventory-db:
    image: postgres:16
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  inventory-api:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: inventory-api
    ports:
      - "5000:5000"
    depends_on:
      - inventory-db
    env_file:
      - ./backend/.env

volumes:
  postgres-data: