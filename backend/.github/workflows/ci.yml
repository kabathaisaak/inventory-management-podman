name: Inventory API CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: inventory
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U admin -d inventory"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create environment file
        run: |
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=inventory" >> .env
          echo "DB_USER=admin" >> .env
          echo "DB_PASSWORD=password" >> .env
          echo "JWT_SECRET_KEY=test-secret" >> .env
          echo "JWT_REFRESH_SECRET=test-refresh" >> .env
          echo "ACCESS_TOKEN_EXPIRES=15" >> .env
          echo "REFRESH_TOKEN_EXPIRES=7" >> .env

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Check formatting
        run: |
          black --check .

      - name: Check imports
        run: |
          isort --check-only .

      - name: Lint code
        run: |
          flake8 .

      - name: Run tests
        run: |
          pytest -vv

      - name: Build Container
        run: |
          docker build -t inventory-api -f Containerfile .